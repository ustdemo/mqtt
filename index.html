<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Data Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a1628;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #0d2744;
            border: 1px solid #1a4a7a;
            border-radius: 16px;
            padding: 40px;
            width: 500px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #90b7f8;
        }

        p.subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }

        label {
            font-size: 13px;
            color: #999;
            display: block;
            margin-bottom: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #051e3e;
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .coord-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .coord-row > div {
            display: flex;
            flex-direction: column;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover { background: #1557b0; }
        button:disabled { background: #333; cursor: not-allowed; }

        #statusMsg {
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        .success { color: #4caf50; }
        .error   { color: #f44336; }
        .info    { color: #90b7f8; }

        .divider {
            border: none;
            border-top: 1px solid #1a4a7a;
            margin: 24px 0;
        }
        .preview {
            background: #051e3e;
            border: 1px solid #1a4a7a;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #90b7f8;
            margin-bottom: 16px;
            font-family: monospace;
            min-height: 40px;
            white-space: pre-wrap;     
            word-break: break-all;     
            overflow-wrap: break-word;  
            max-height: 150px;         
            overflow-y: auto;           
    }
    </style>
</head>
<body>
<div class="container">

    <h1>MQTT Data Portal</h1>
    <p class="subtitle">Send location coordinates to Android devices via MQTT</p>

    <hr class="divider"/>

    <!-- MQTT Config -->
    <label>HiveMQ Host</label>
    <input type="text" id="mqttHost" value="broker.hivemq.com"/>

    <label>MQTT Topic</label>
    <input type="text" id="mqttTopic" value="havis/mqtt/files"/>

    <hr class="divider"/>

    <!-- Coordinates Input -->
    <label>Location Coordinates</label>

    <div class="coord-row">
        <div>
            <label>Latitude</label>
            <input type="text" id="latitude" placeholder="e.g. 17.3850"/>
        </div>
        <div>
            <label>Longitude</label>
            <input type="text" id="longitude" placeholder="e.g. 78.4867"/>
        </div>
    </div>

    <label>Label (optional)</label>
    <input type="text" id="label" placeholder="e.g. Vehicle Location"/>

    <!-- Payload Preview -->
    <label>Payload Preview</label>
    <div class="preview" id="payloadPreview">
        Fill in coordinates to preview payload
    </div>

    <button id="btnPublish">Publish via MQTT</button>

    <div id="statusMsg"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

<script>
    const latInput   = document.getElementById('latitude')
    const lngInput   = document.getElementById('longitude')
    const labelInput = document.getElementById('label')
    const preview    = document.getElementById('payloadPreview')
    const btnPublish = document.getElementById('btnPublish')
    const statusMsg  = document.getElementById('statusMsg')

    // ── Live payload preview ─────────────────────────────────────
    function updatePreview() {
        const lat   = latInput.value.trim()
        const lng   = lngInput.value.trim()
        const label = labelInput.value.trim()

        if (lat && lng) {
            const payload = buildPayload(lat, lng, label)
            preview.textContent = JSON.stringify(JSON.parse(payload), null, 2)
        } else {
            preview.textContent = 'Fill in coordinates to preview payload'
        }
    }

    latInput.addEventListener('input', updatePreview)
    lngInput.addEventListener('input', updatePreview)
    labelInput.addEventListener('input', updatePreview)

    // ── Build payload ────────────────────────────────────────────
    function buildPayload(lat, lng, label) {
        const data = {
            type      : "location",
            latitude  : parseFloat(lat),
            longitude : parseFloat(lng),
            label     : label || "Location",
            timestamp : new Date().toISOString()
        }
        return JSON.stringify(data)
    }

    // ── Publish ──────────────────────────────────────────────────
    btnPublish.addEventListener('click', async () => {
        const mqttHost  = document.getElementById('mqttHost').value.trim()
        const mqttTopic = document.getElementById('mqttTopic').value.trim()
        const lat       = latInput.value.trim()
        const lng       = lngInput.value.trim()
        const label     = labelInput.value.trim()

        if (!lat || !lng) {
            setStatus('Please enter latitude and longitude', 'error')
            return
        }

        if (!mqttHost || !mqttTopic) {
            setStatus('Please enter MQTT host and topic', 'error')
            return
        }

        btnPublish.disabled = true
        setStatus('Connecting to MQTT...', 'info')

        try {
            const payload = buildPayload(lat, lng, label)
            await publishToMqtt(mqttHost, mqttTopic, payload)
            setStatus(`✓ Published successfully to topic: ${mqttTopic}`, 'success')
        } catch (err) {
            setStatus(`Error: ${err.message}`, 'error')
        } finally {
            btnPublish.disabled = false
        }
    })

    // ── MQTT Publish ─────────────────────────────────────────────
    function publishToMqtt(host, topic, message) {
       return new Promise((resolve, reject) => {
        const clientId = 'portal-' + Math.random().toString(16).substr(2, 8)

        // Try ports in order: 443 → 8884 → 8083
        const client   = mqtt.connect(`wss://${host}:8884/mqtt`, {
            clientId,
            clean: true,
            connectTimeout: 10000
        });

        // Timeout after 10 seconds
        const timeout = setTimeout(() => {
            client.end(true)
            reject(new Error('Connection timeout — broker unreachable'))
        }, 10000)

        client.on('connect', () => {
            clearTimeout(timeout)
            console.log('MQTT connected on port 443')
            client.publish(topic, message, { qos: 1 }, (err) => {
                client.end()
                if (err) reject(err)
                else resolve()
            })
        })

        client.on('error', (err) => {
            clearTimeout(timeout)
            console.error('MQTT error:', err)
            client.end()
            reject(err)
        })
       })
    }

    function setStatus(msg, type) {
        statusMsg.textContent = msg
        statusMsg.className   = type
    }
</script>
</body>
</html>
